{% extends 'app/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white text-center">
                    <h3><i class="fas fa-user-plus"></i> Create Your Account</h3>
                    <p>Join FreshOKart as Buyer or Seller</p>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-success btn-lg px-5">
                                <i class="fas fa-user-check"></i> Sign Up
                            </button>
                        </div>
                    </form>
                    <div class="text-center mt-3">
                        <p>Already have an account? <a href="{% url 'login' %}" class="text-success">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .card {
        border-radius: 15px;
        overflow: hidden;
        border: none;
    }
    .card-header {
        background: linear-gradient(135deg, #2e7d32, #1b5e20);
        border-bottom: none;
    }
    .btn-success {
        background-color: #2e7d32;
        border: none;
        border-radius: 25px;
        transition: all 0.3s;
    }
    .btn-success:hover {
        background-color: #1b5e20;
        transform: translateY(-2px);
    }
</style>
{% endblock %}
